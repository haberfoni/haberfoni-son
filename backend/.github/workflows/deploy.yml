name: Backend Deploy

on:
  push:
    branches: [ main ] # Veya projenizin ana dalı hangisiyse

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /path/to/your/backend/folder # Sunucudaki backend klasörünüz
            git pull origin main
            docker compose up -d --build backend
