server {
    listen 80;
    server_name _;

    # 1. API PROXY - EN YÜKSEK ÖNCELİK (Prefix match with no trailing slash)
    location /servis {
        # POST isteklerine Nginx'in 405 dönmesini engellemek için (eğer bir şekilde statik sanırsa)
        error_page 405 =200 $uri;
        
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. TEST ENDPOINT - SÜRÜM KONTROLÜ
    location = /test-nginx {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "NGINX-OK-v6-ADMIN-FIX";
    }

    # 3. YÜKLENEN DOSYALAR
    location /uploads/ {
        proxy_pass http://backend:3000/uploads/;
        proxy_set_header Host $host;
    }

    # 4. FRONTEND (SPA CATCH-ALL)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
